<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLMS Create Lesson</title>

<link rel="stylesheet" href="CreateLessons.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <a href="teachers.html">
            <img src="logo.png" alt="School Logo" class="school-logo">
        </a>
        <h2>GLMS</h2>
    </div>
    
    <ul class="menu">
        <li><i class="fa-solid fa-gauge"></i> Dashboard</li>
        <li class="active"><i class="fa-solid fa-book-open"></i> Lessons Management</li>
        <li><i class="fa-solid fa-clipboard-check"></i> Assessments</li>
        <li><i class="fa-solid fa-users"></i> Student List</li>
        <li><i class="fa-solid fa-chart-column"></i> Grades</li>
        <li><i class="fa-solid fa-bullhorn"></i> Announcements</li>
    </ul>
    
    <div class="logout">
        <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
    </div>
</aside>

<main class="main-content">

    <div class="page-header">
        <div>
            <h3>Create New Lesson</h3>
            <p>Add a new lesson material for your students.</p>
        </div>

        <a href="lessonsm.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back to Lessons
        </a>
    </div>

    <section class="lesson-form-card">
        <div class="card-title">
            <h3>Lesson Details</h3>
        </div>

        <form>
            <div class="form-row">
                <div class="form-group">
                    <label>Lesson Title</label>
                    <input type="text" placeholder="Example: Introduction to HTML">
                </div>

                <div class="form-group">
                    <label>Subject</label>
                    <select>
                        <option>Web Development</option>
                        <option>Programming Fundamentals</option>
                        <option>Database Management</option>
                        <option>Computer Networking</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Lesson Description</label>
                <textarea placeholder="Write a short description or lesson instructions..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Upload Material</label>
                    <input type="file">
                </div>

                <div class="form-group">
                    <label>Visibility</label>
                    <select>
                        <option>Visible to Students</option>
                        <option>Draft Only</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="save-btn">
                <i class="fa-solid fa-floppy-disk"></i>
                Save Lesson
            </button>
        </form>
    </section>

</main>

</body>
</html>
