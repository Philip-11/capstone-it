<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLMS Upload Profile Picture</title>

<link rel="stylesheet" href="uploadprofile.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="upload-page">

    <div class="brand-section">
        <div class="logo-box">
            <img src="LOGO.png" alt="School Logo">
        </div>

        <div>
            <h1>GLMS</h1>
            <p>Student Profile</p>
        </div>
    </div>

    <div class="upload-card">

        <div class="card-header">
            <h2>Upload Profile Picture</h2>
            <p>Choose a photo to update your student profile picture.</p>
        </div>

        <div class="profile-preview">
            <div class="avatar-circle">
                <i class="fa-solid fa-user"></i>
            </div>

            <h3>Jessie Vash</h3>
            <p>BS Information Technology</p>
        </div>

        <form>

            <div class="form-group">
                <label>Choose Profile Picture</label>

                <div class="upload-box">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>Click to upload your image</p>
                    <span>JPG, PNG, or JPEG only</span>
                    <input type="file" accept="image/png, image/jpeg, image/jpg">
                </div>
            </div>

            <div class="upload-note">
                <i class="fa-solid fa-circle-info"></i>
                <span>Use a clear photo. Recommended size is square, such as 500 × 500 pixels.</span>
            </div>

            <button type="submit" class="save-btn">
                <i class="fa-solid fa-floppy-disk"></i>
                Save Profile Picture
            </button>

            <a href="profile.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i>
                Back to Profile
            </a>

        </form>

    </div>

</div>

</body>
</html>
