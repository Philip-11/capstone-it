<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLMS Dashboard</title>

<link rel="stylesheet" href="homepage.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<!-- Fixed Left Sidebar -->
<aside class="sidebar">
    <div class="sidebar-header">
        <h2>GLMS</h2>
    </div>
    
    <ul class="menu">
        <li class="active">
            <i class="fa-solid fa-gauge"></i> Dashboard
        </li>
        <li>
            <i class="fa-solid fa-book-open"></i> My Courses
        </li>
        <li>
            <i class="fa-solid fa-clipboard-check"></i> Assignments
        </li>
        <li>
            <i class="fa-solid fa-user-circle"></i> Profile
        </li>
    </ul>
    
    <div class="logout">
        <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
    </div>
</aside>

<!-- Main Content -->
<main class="main-content">
    <div class="navbar">
        <h2>GLMS</h2>
        <span>Welcome, Student</span>
    </div>

    <div class="hero">
        <h3>Welcome back </h3>
        <p>You have 3 courses in progress</p>
        <button>Continue Learning</button>
    </div>

    <div class="stats">
        <div class="card">
            <h4>Courses</h4>
            <p>7</p>
        </div>
        <div class="card">
            <h4>Completed</h4>
            <p>4</p>
        </div>
        <div class="card">
            <h4>Hours</h4>
            <p>42</p>
        </div>
        <div class="card">
            <h4>Pending</h4>
            <p>2</p>
        </div>
    </div>

    <h3 class="section-title">My Courses</h3>

    <div class="courses">
        <div class="course-card">
            <h4>Web Development</h4>
            <p>HTML, CSS, JS</p>
            <div class="progress-bar">
                <div class="progress" style="width:75%"></div>
            </div>
            <button>Continue</button>
        </div>

        <div class="course-card">
            <h4>Programming</h4>
            <p>Basics of coding</p>
            <div class="progress-bar">
                <div class="progress" style="width:50%"></div>
            </div>
            <button>Continue</button>
        </div>

        <div class="course-card">
            <h4>Database</h4>
            <p>Learn SQL</p>
            <div class="progress-bar">
                <div class="progress" style="width:30%"></div>
            </div>
            <button>Continue</button>
        </div>
    </div>
</main>

</body>
</html>
