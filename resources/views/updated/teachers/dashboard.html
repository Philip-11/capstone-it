<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLMS Teacher Dashboard</title>

<link rel="stylesheet" href="dashboard.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="top-navbar">
    
    <div class="ai-chatbot">
        <i class="fa-solid fa-robot"></i>
    </div>

    <div class="brand">
        <a href="https://www.facebook.com/SJBKalentongBranchOfficial/photos">
            <img src="LOGO.png" alt="School Logo">
        </a>
        <h2>GLMS</h2>
    </div>

    <nav class="nav-links">
        <a href="tdashboard.html" class="active">Dashboard</a>
        <a href="lessonsm.html">Lessons</a>
        <a href="assignmentm.html">Assignments</a>
        <a href="studentlist.html">Students</a>
        <a href="grades.html">Grades</a>
        <a href="announcements.html">Announcements</a>
    </nav>

    <a href="login.html" class="logout-btn">
        Logout
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
    </a>
</header>

<main class="main-content">

    <section class="teacher-hero">
        <span class="badge">Teacher Portal</span>
        <h1>Welcome back, Teacher</h1>
        <p>Manage lessons, assignments, students, grades, and announcements in one dashboard.</p>
        <button>Create Lesson</button>
    </section>

    <section class="dashboard-section">
        <div class="section-header">
            <h3>Dashboard Overview</h3>
        </div>

        <div class="dashboard-cards">
            <div class="card">
                <i class="fa-solid fa-book-open"></i>
                <h4>Lessons</h4>
                <p>12</p>
            </div>

            <div class="card">
                <i class="fa-solid fa-clipboard-check"></i>
                <h4>Assignments</h4>
                <p>8</p>
            </div>

            <div class="card">
                <i class="fa-solid fa-users"></i>
                <h4>Students</h4>
                <p>42</p>
            </div>

            <div class="card">
                <i class="fa-solid fa-chart-column"></i>
                <h4>Grades Posted</h4>
                <p>18</p>
            </div>

            <div class="card">
                <i class="fa-solid fa-bullhorn"></i>
                <h4>Announcements</h4>
                <p>5</p>
            </div>
        </div>
    </section>

</main>

</body>
</html>
